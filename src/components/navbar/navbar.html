<nav class="navbar">

    <div class="navbar-container">

        <div class="navbar-logo">
            <img src="assets/anasol-logo.png" alt="Logo ANASOL" class="logo-image">
        </div>

        <div class="navbar-links">
            <button *ngFor="let item of navItems" (click)="scrollToSection(item.target)">
                {{ item.label }}
            </button>
        </div>

        <button class="login-btn" (click)="login()">
            Connexion
        </button>

        <button class="hamburger-btn" (click)="toggleMenu()">
            ☰
        </button>

    </div>

</nav>

@if (mobileMenuOpen) {

<div class="mobile-overlay" (click)="closeMenu()"></div>

<div class="mobile-drawer">

    <button *ngFor="let item of navItems" (click)="scrollToSection(item.target)">
        {{ item.label }}
    </button>

    <button class="mobile-login-btn" (click)="login()">
        Connexion
    </button>

</div>

}
